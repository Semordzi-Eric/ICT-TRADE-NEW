strategy:
  # ----- Universe -----------------------------------------------------------
  # Six FX majors. Run on M15. Expected aggregate ~3.5–4 trades/day.
  symbols:
    - EURUSD
    - GBPUSD
    - USDJPY
  default_timeframe: M15

  # ----- Per-trade & portfolio risk -----------------------------------------
  risk_per_trade: 0.0035         # 0.35% per trade — 6 concurrent caps total at ~2.1%
  max_daily_trades: 12           # aggregate across all symbols
  daily_loss_limit: 0.03         # 3% daily DD halt
  weekly_loss_limit: 0.06        # 6% weekly DD halt
  consecutive_loss_limit: 3
  consecutive_loss_cooldown_hours: 4
  min_model_probability: 0.65

  # ----- Killzone filter ----------------------------------------------------
  # When enabled, only generate signals during London open and NY open windows.
  # ICT setups have the highest historical win rate at session opens.
  # Set to false to trade all hours (useful for backtesting comparison).
  killzone_only: true
  killzone_windows:             # UTC times — adjust for DST if needed
    london_open: ["08:00", "10:00"]
    ny_open:     ["13:00", "15:30"]

  # ----- Higher-timeframe bias filter ---------------------------------------
  # Only take M15 longs when H4 structure is bullish, and vice versa.
  # Set to false to disable (counter-trend trading allowed).
  htf_filter_enabled: true
  htf_timeframe: "H4"
  htf_bars: 200                 # H4 bars to fetch for bias detection

  # ----- Adaptive position sizing -------------------------------------------
  # Automatically scale risk when rolling win rate deteriorates.
  adaptive_sizing: true
  adaptive_sizing_lookback: 10  # trailing trades to measure win rate
  adaptive_sizing_low_wr: 0.35  # below this WR → scale risk by low_wr_mult
  adaptive_sizing_high_wr: 0.45 # above this WR → restore normal risk
  adaptive_sizing_low_mult: 0.7 # risk multiplier during drawdown (0.7 = 70% normal)
  adaptive_sizing_kz_mult: 1.1  # bonus multiplier for killzone signals (10% larger)

  # ----- Rule-based-only fallback probability --------------------------------
  # Used when no trained ML ensemble is available (--no-model mode or missing
  # models_artifacts/). Lower than 0.65 threshold so signals still need
  # structure confirmation but aren't gated by an uninformed model.
  rule_based_prob: 0.55

  # ----- Correlation filter -------------------------------------------------
  # Pairs that move together — block same-direction concurrent entries.
  correlation_filter_pairs:
    - ["EURUSD", "GBPUSD", 0.85]   # both EUR/USD-driven
    - ["AUDUSD", "NZDUSD", 0.90]   # commodity-bloc twins
    - ["EURUSD", "AUDUSD", 0.70]   # USD-side correlation
    - ["USDJPY", "USDCAD", 0.65]   # USD-base correlation
    - ["NAS100", "SPX500", 0.95]   # reserved for future indices use

  account_starting_balance: 10000.0
