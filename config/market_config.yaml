# Per-symbol market metadata.
# Used by the executor, sentiment engine, and training pipeline.
# Categories: fx | metal | index | crypto
# session_type: forex (respect killzones) | equity (US session only) | crypto (24/7) | metal (near-24/7)

markets:
  # ---------------------------------------------------------------------------
  # FX Majors
  # ---------------------------------------------------------------------------
  EURUSD:
    category: fx
    pip_size: 0.0001
    session_type: forex
    max_spread_pips: 3.0
    contract_value: 100000.0
    news_currencies: [EUR, USD]
    training_start_years: 5      # how many years of history to train on

  GBPUSD:
    category: fx
    pip_size: 0.0001
    session_type: forex
    max_spread_pips: 3.0
    contract_value: 100000.0
    news_currencies: [GBP, USD]
    training_start_years: 5

  USDJPY:
    category: fx
    pip_size: 0.01
    session_type: forex
    max_spread_pips: 3.0
    contract_value: 100000.0
    news_currencies: [USD, JPY]
    training_start_years: 5

  AUDUSD:
    category: fx
    pip_size: 0.0001
    session_type: forex
    max_spread_pips: 3.5
    contract_value: 100000.0
    news_currencies: [AUD, USD]
    training_start_years: 4

  USDCAD:
    category: fx
    pip_size: 0.0001
    session_type: forex
    max_spread_pips: 3.5
    contract_value: 100000.0
    news_currencies: [USD, CAD]
    training_start_years: 4

  NZDUSD:
    category: fx
    pip_size: 0.0001
    session_type: forex
    max_spread_pips: 4.0
    contract_value: 100000.0
    news_currencies: [NZD, USD]
    training_start_years: 4

  # ---------------------------------------------------------------------------
  # FX Minors
  # ---------------------------------------------------------------------------
  EURGBP:
    category: fx
    pip_size: 0.0001
    session_type: forex
    max_spread_pips: 4.0
    contract_value: 100000.0
    news_currencies: [EUR, GBP]
    training_start_years: 4

  EURJPY:
    category: fx
    pip_size: 0.01
    session_type: forex
    max_spread_pips: 4.0
    contract_value: 100000.0
    news_currencies: [EUR, JPY]
    training_start_years: 4

  GBPJPY:
    category: fx
    pip_size: 0.01
    session_type: forex
    max_spread_pips: 5.0
    contract_value: 100000.0
    news_currencies: [GBP, JPY]
    training_start_years: 4

  # ---------------------------------------------------------------------------
  # Metals
  # ---------------------------------------------------------------------------
  XAUUSD:
    category: metal
    pip_size: 0.1            # $0.10 per pip; 1 ATR ≈ $15–25
    session_type: metal      # near-24/7; respect London + NY killzones
    max_spread_pips: 5.0
    contract_value: 100.0   # 100 troy oz per lot
    news_currencies: [USD]
    sentiment_keywords: [gold, DXY, dollar, Fed, inflation, safe haven, treasury]
    training_start_years: 5

  XAGUSD:
    category: metal
    pip_size: 0.01
    session_type: metal
    max_spread_pips: 8.0
    contract_value: 5000.0
    news_currencies: [USD]
    sentiment_keywords: [silver, gold, DXY, industrial, inflation]
    training_start_years: 4

  # ---------------------------------------------------------------------------
  # Equity Indices (CFD)
  # ---------------------------------------------------------------------------
  NAS100:
    category: index
    pip_size: 1.0            # 1 index point per pip
    session_type: equity     # US equity session: 13:30–20:00 UTC
    active_hours: ["13:30", "20:00"]
    max_spread_pips: 10.0
    contract_value: 1.0
    news_currencies: [USD]
    sentiment_keywords: [nasdaq, tech, Fed, rates, earnings, FOMC]
    training_start_years: 4

  SPX500:
    category: index
    pip_size: 0.1
    session_type: equity
    active_hours: ["13:30", "20:00"]
    max_spread_pips: 5.0
    contract_value: 1.0
    news_currencies: [USD]
    sentiment_keywords: [S&P, Fed, inflation, recession, earnings, FOMC]
    training_start_years: 4

  US30:
    category: index
    pip_size: 1.0
    session_type: equity
    active_hours: ["13:30", "20:00"]
    max_spread_pips: 20.0
    contract_value: 1.0
    news_currencies: [USD]
    sentiment_keywords: [dow, industrial, Fed, blue chip, FOMC]
    training_start_years: 4

  # ---------------------------------------------------------------------------
  # Crypto CFDs
  # ---------------------------------------------------------------------------
  BTCUSD:
    category: crypto
    pip_size: 1.0            # $1 per pip
    session_type: crypto     # 24/7 — no killzone blocking (unless intuition_mode off)
    max_spread_pips: 50.0
    contract_value: 1.0      # 1 BTC per lot; use volume 0.01 for micro lots
    news_currencies: [BTC, USD]
    sentiment_source: cryptopanic  # use CryptoPanic API for sentiment
    sentiment_keywords: [bitcoin, BTC, crypto, halving, ETF, SEC, Fed]
    training_start_years: 3   # BTC M15 meaningful data from ~2020

  ETHUSD:
    category: crypto
    pip_size: 1.0
    session_type: crypto
    max_spread_pips: 20.0
    contract_value: 1.0
    news_currencies: [ETH, USD]
    sentiment_source: cryptopanic
    sentiment_keywords: [ethereum, ETH, crypto, DeFi, staking, SEC]
    training_start_years: 3
