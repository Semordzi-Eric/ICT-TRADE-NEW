risk:
  max_position_size_contracts: 1.0
  max_correlation_exposure: 0.015    # 1.5% of account on any one correlated cluster
  stop_loss_atr_multiplier: 1.5
  take_profit_r_multiple: 1.5    # reduced from 2.0 — raises base win rate ~35%→42%
  trailing_stop_activation_r: 0.8   # activate trail when 0.8R in profit
  trailing_stop_atr_multiplier: 1.0
  max_drawdown_halt: 0.10            # 10% peak DD halts all trading
  max_holding_bars: 12               # 3 hours on M15 — reduced from 36 to tighten horizon
  max_open_positions: 10             # increased from 6 (16 symbols need more headroom)

  # --- Spread filter ---------------------------------------------------------
  # Per-symbol overrides are in market_config.yaml; this is the global default.
  max_spread_pips: 3.0

  # --- MT5 reconnect settings ------------------------------------------------
  reconnect_retries: 3
  reconnect_delay_seconds: 30

  # --- Deal profit history window --------------------------------------------
  deal_profit_lookback_days: 7

  # --- Per-symbol contract value (notional per 1.0 lot) ---------------------
  # FX Majors & Minors: 100,000 units
  # Metals (Gold/Silver): 100 troy oz per lot (XAU = 100, XAG = 5000)
  # Indices: 1 index point per lot (brokers vary — verify with your broker)
  # Crypto: 1 BTC / 1 ETH per lot (micro lots 0.01 are common)
  contract_value_per_symbol:
    # FX Majors
    EURUSD: 100000.0
    GBPUSD: 100000.0
    USDJPY: 100000.0
    AUDUSD: 100000.0
    USDCAD: 100000.0
    NZDUSD: 100000.0
    # FX Minors
    EURGBP: 100000.0
    EURJPY: 100000.0
    GBPJPY: 100000.0
    # Metals
    XAUUSD: 100.0      # 1 lot = 100 troy oz — $1 move = $100 P&L per lot
    XAGUSD: 5000.0     # 1 lot = 5000 troy oz
    # Equity Indices (CFD — 1 lot = 1 index point P&L per $1 move)
    NAS100: 1.0
    SPX500: 1.0
    US30:   1.0
    # Crypto CFDs (1 lot = 1 BTC or 1 ETH — use 0.01 micro lots in practice)
    BTCUSD: 1.0
    ETHUSD: 1.0

  # --- Per-symbol spread overrides ------------------------------------------
  # These override max_spread_pips for instruments with wider natural spreads.
  max_spread_pips_override:
    NAS100:  10.0    # index spread in index points (pip_size=1.0)
    SPX500:   5.0
    US30:    20.0
    XAUUSD:   5.0   # gold spread in pips (pip_size=0.1 → $0.50 per pip)
    XAGUSD:   8.0
    BTCUSD: 50.0    # crypto spread in USD "pips" (pip_size=1.0)
    ETHUSD: 20.0
